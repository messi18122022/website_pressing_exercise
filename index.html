<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Press Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
      padding: 24px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
    }

    #timer {
      font-size: 5.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    #timer.finished { color: #4ade80; }

    #progress-ring {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #progress-ring svg {
      position: absolute;
      top: 0; left: 0;
      transform: rotate(-90deg);
    }
    circle.track { fill: none; stroke: #222; stroke-width: 8; }
    circle.progress {
      fill: none;
      stroke: #fff;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }
    circle.progress.finished { stroke: #4ade80; }

    /* Mic indicator */
    #mic-ring {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      border: 3px solid transparent;
      transition: border-color 0.1s, box-shadow 0.1s;
      pointer-events: none;
    }
    #mic-ring.active {
      border-color: #4ade80;
      box-shadow: 0 0 18px #4ade8088;
    }

    /* Points */
    #points-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .pt-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      font-size: 2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .pt-btn:active { transform: scale(0.88); }
    #btn-minus { background: #2a1a1a; color: #f87171; }
    #btn-plus  { background: #1a2a1a; color: #4ade80; }

    #points-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 80px;
    }
    #points-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
    }
    #points {
      font-size: 3.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: color 0.15s;
    }
    #delta {
      font-size: 1.2rem;
      font-weight: 600;
      min-height: 1.5rem;
      opacity: 0;
      transition: opacity 0.1s;
    }
    #delta.show { opacity: 1; }
    #delta.plus, #points.plus { color: #4ade80; }
    #delta.minus, #points.minus { color: #f87171; }

    #btn {
      background: #fff;
      color: #111;
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, transform 0.1s;
    }
    #btn:active { transform: scale(0.96); }
    #btn.running { background: #333; color: #fff; }

    #status {
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.08em;
      min-height: 1.2em;
      text-align: center;
      max-width: 300px;
    }
    #status a { color: #4ade80; text-decoration: underline; }
  </style>
</head>
<body>

  <h1>Press Timer</h1>

  <div id="progress-ring">
    <div id="mic-ring"></div>
    <svg width="240" height="240" viewBox="0 0 240 240">
      <circle class="track"    cx="120" cy="120" r="108"/>
      <circle class="progress" cx="120" cy="120" r="108" id="ring"/>
    </svg>
    <div id="timer">5:00</div>
  </div>

  <div id="points-row">
    <button class="pt-btn" id="btn-minus" ontouchstart="bumpPoint(-1)" onclick="bumpPoint(-1)">−</button>
    <div id="points-wrap">
      <div id="points-label">Punkte</div>
      <div id="points">0</div>
      <div id="delta"></div>
    </div>
    <button class="pt-btn" id="btn-plus" ontouchstart="bumpPoint(1)" onclick="bumpPoint(1)">+</button>
  </div>

  <button id="btn" onclick="toggle()">Start</button>
  <div id="status"></div>

  <script>
    const TOTAL = 5 * 60;
    const CIRC  = 2 * Math.PI * 108;

    let remaining    = TOTAL;
    let clockInterval = null;
    let running      = false;
    let points       = 0;
    let deltaTimeout = null;
    let lastTap      = 0;

    const timerEl  = document.getElementById('timer');
    const btnEl    = document.getElementById('btn');
    const ringEl   = document.getElementById('ring');
    const micRing  = document.getElementById('mic-ring');
    const statusEl = document.getElementById('status');
    const pointsEl = document.getElementById('points');
    const deltaEl  = document.getElementById('delta');

    ringEl.style.strokeDasharray  = CIRC;
    ringEl.style.strokeDashoffset = 0;

    const canVibrate = 'vibrate' in navigator;
    function vibrate(p) { if (canVibrate) navigator.vibrate(p); }

    function format(s) {
      return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
    }
    function updateRing() {
      ringEl.style.strokeDashoffset = CIRC * (1 - remaining / TOTAL);
    }

    // ── Point counter ──────────────────────────────────────────────
    function bumpPoint(delta) {
      const now = Date.now();
      if (now - lastTap < 300) return;
      lastTap = now;
      addPoint(delta);
    }

    function addPoint(delta) {
      points += delta;
      pointsEl.textContent = points;
      const cls = delta > 0 ? 'plus' : 'minus';
      pointsEl.className = cls;
      deltaEl.textContent  = delta > 0 ? '+1' : '−1';
      deltaEl.className    = 'show ' + cls;
      clearTimeout(deltaTimeout);
      deltaTimeout = setTimeout(() => {
        pointsEl.className = '';
        deltaEl.className  = '';
      }, 500);
    }

    // ── Clap detection ─────────────────────────────────────────────
    let analyser   = null;
    let micLoop    = null;
    let lastClap   = 0;
    const THRESHOLD = 40; // 0–128, tune if needed

    async function startMic() {
      if (analyser) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        const ctx    = new AudioContext();
        const src    = ctx.createMediaStreamSource(stream);
        analyser     = ctx.createAnalyser();
        analyser.fftSize = 512;
        src.connect(analyser);
        listenForClap();
        statusEl.textContent = '🎤 Klatschen = +1 Punkt';
        setTimeout(() => { if (statusEl.textContent.includes('Klatschen')) statusEl.textContent = ''; }, 2500);
      } catch (e) {
        statusEl.textContent = 'Kein Mikrofonzugriff — Buttons nutzen';
      }
    }

    function listenForClap() {
      const buf = new Uint8Array(analyser.fftSize);
      micLoop = setInterval(() => {
        analyser.getByteTimeDomainData(buf);
        let peak = 0;
        for (const v of buf) {
          const amp = Math.abs(v - 128);
          if (amp > peak) peak = amp;
        }
        if (peak > THRESHOLD) {
          const now = Date.now();
          if (now - lastClap > 400) {
            lastClap = now;
            addPoint(1);
            micRing.classList.add('active');
            setTimeout(() => micRing.classList.remove('active'), 150);
          }
        }
      }, 30);
    }

    function stopMic() {
      if (micLoop) { clearInterval(micLoop); micLoop = null; }
    }

    // ── Timer ──────────────────────────────────────────────────────
    function tick() {
      remaining--;
      timerEl.textContent = format(remaining);
      updateRing();

      if (remaining > 0 && remaining % 30 === 0) {
        vibrate([400, 100, 400]);
      }

      if (remaining === 0) {
        vibrate([300, 100, 300, 100, 300, 150, 800]);
        clearInterval(clockInterval); clockInterval = null;
        running = false;
        stopMic();
        timerEl.classList.add('finished');
        ringEl.classList.add('finished');
        btnEl.textContent = 'Neu starten';
        btnEl.classList.remove('running');
        statusEl.textContent = 'Fertig!';
      }
    }

    function toggle() {
      if (remaining === 0) {
        remaining = TOTAL;
        points    = 0;
        pointsEl.textContent = '0';
        pointsEl.className   = '';
        timerEl.textContent  = format(remaining);
        timerEl.classList.remove('finished');
        ringEl.classList.remove('finished');
        updateRing();
        statusEl.textContent = '';
      }

      if (!running) {
        running = true;
        btnEl.textContent = 'Stop';
        btnEl.classList.add('running');
        clockInterval = setInterval(tick, 1000);
        vibrate([400, 100, 400]);
        startMic();
      } else {
        running = false;
        clearInterval(clockInterval); clockInterval = null;
        btnEl.textContent = 'Weiter';
        btnEl.classList.remove('running');
        stopMic();
      }
    }
  </script>

</body>
</html>
