<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Press Timer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
      padding: 24px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
    }

    #timer {
      font-size: 5.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    #timer.finished { color: #4ade80; }

    #progress-ring {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #progress-ring svg {
      position: absolute;
      top: 0; left: 0;
      transform: rotate(-90deg);
    }

    circle.track {
      fill: none;
      stroke: #222;
      stroke-width: 8;
    }

    circle.progress {
      fill: none;
      stroke: #fff;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }

    circle.progress.finished { stroke: #4ade80; }

    /* Points row */
    #points-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .pt-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      font-size: 2.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }

    .pt-btn:active { transform: scale(0.88); }

    #btn-minus {
      background: #2a1a1a;
      color: #f87171;
    }

    #btn-plus {
      background: #1a2a1a;
      color: #4ade80;
    }

    #points-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 80px;
    }

    #points-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
    }

    #points {
      font-size: 3.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: color 0.15s;
    }

    #delta {
      font-size: 1.2rem;
      font-weight: 600;
      min-height: 1.5rem;
      opacity: 0;
      transition: opacity 0.1s;
    }

    #delta.show { opacity: 1; }
    #delta.plus, #points.plus { color: #4ade80; }
    #delta.minus, #points.minus { color: #f87171; }

    #btn {
      background: #fff;
      color: #111;
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, transform 0.1s;
    }

    #btn:active { transform: scale(0.96); }
    #btn.running { background: #333; color: #fff; }

    #status {
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.1em;
      min-height: 1.2em;
      text-align: center;
      max-width: 280px;
    }

    #status a { color: #4ade80; text-decoration: underline; }
  </style>
</head>
<body>

  <h1>Press Timer</h1>

  <div id="progress-ring">
    <svg width="240" height="240" viewBox="0 0 240 240">
      <circle class="track" cx="120" cy="120" r="108"/>
      <circle class="progress" id="ring" cx="120" cy="120" r="108"/>
    </svg>
    <div id="timer">5:00</div>
  </div>

  <div id="points-row">
    <button class="pt-btn" id="btn-minus">−</button>
    <div id="points-wrap">
      <div id="points-label">Punkte</div>
      <div id="points">0</div>
      <div id="delta"></div>
    </div>
    <button class="pt-btn" id="btn-plus">+</button>
  </div>

  <button id="btn" onclick="toggle()">Start</button>
  <div id="status"></div>

  <script>
    const TOTAL = 5 * 60;
    const CIRCUMFERENCE = 2 * Math.PI * 108;

    let remaining = TOTAL;
    let interval = null;
    let running = false;
    let points = 0;
    let deltaTimeout = null;

    const timerEl  = document.getElementById('timer');
    const btnEl    = document.getElementById('btn');
    const ringEl   = document.getElementById('ring');
    const statusEl = document.getElementById('status');
    const pointsEl = document.getElementById('points');
    const deltaEl  = document.getElementById('delta');

    ringEl.style.strokeDasharray = CIRCUMFERENCE;
    ringEl.style.strokeDashoffset = 0;

    function format(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function updateRing() {
      const offset = CIRCUMFERENCE * (1 - remaining / TOTAL);
      ringEl.style.strokeDashoffset = offset;
    }

    const canVibrate = 'vibrate' in navigator;
    let mediaAudio = null;

    function openInChrome() {
      location.href = 'intent://' + location.href.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
    }

    function vibrate(pattern) {
      if (canVibrate) navigator.vibrate(pattern);
    }

    function initAudio() {
      if (mediaAudio) return;

      // Silent WAV — muss ein echtes Audio-Element sein damit MediaSession aktiv wird
      const sr = 8000, n = sr;
      const buf = new ArrayBuffer(44 + n * 2);
      const dv = new DataView(buf);
      const wr = (o, s) => [...s].forEach((c, i) => dv.setUint8(o + i, c.charCodeAt(0)));
      wr(0, 'RIFF'); dv.setUint32(4, 36 + n * 2, true);
      wr(8, 'WAVE'); wr(12, 'fmt ');
      dv.setUint32(16, 16, true); dv.setUint16(20, 1, true);
      dv.setUint16(22, 1, true);  dv.setUint32(24, sr, true);
      dv.setUint32(28, sr * 2, true); dv.setUint16(32, 2, true);
      dv.setUint16(34, 16, true); wr(36, 'data');
      dv.setUint32(40, n * 2, true);

      const url = URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
      mediaAudio = new Audio(url);
      mediaAudio.loop = true;
      mediaAudio.volume = 0.001;
      mediaAudio.play().catch(() => {});

      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: 'Press Timer',
          artist: 'Kopfhörer-Taste = Punkt'
        });
        // Play/Pause-Taste (einzelne Kopfhörertaste) → +1
        navigator.mediaSession.setActionHandler('play',          () => addPoint(1));
        navigator.mediaSession.setActionHandler('pause',         () => addPoint(1));
        // Vor/Zurück (Mehrknopf-Fernbedienung) → +1 / −1
        navigator.mediaSession.setActionHandler('nexttrack',     () => addPoint(1));
        navigator.mediaSession.setActionHandler('previoustrack', () => addPoint(-1));
      }
    }

    function addPoint(delta) {
      points += delta;
      pointsEl.textContent = points;

      const cls = delta > 0 ? 'plus' : 'minus';
      pointsEl.className = cls;
      deltaEl.textContent = delta > 0 ? '+1' : '−1';
      deltaEl.className = 'show ' + cls;

      clearTimeout(deltaTimeout);
      deltaTimeout = setTimeout(() => {
        pointsEl.className = '';
        deltaEl.className  = '';
      }, 500);
    }

    // Use touchstart + preventDefault to block the follow-up click,
    // so rapid taps all register without a long debounce.
    function bindPointBtn(el, delta) {
      let blocked = false;
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        addPoint(delta);
      }, { passive: false });
      // Fallback for mouse (desktop)
      el.addEventListener('click', () => {
        if (blocked) return;
        addPoint(delta);
      });
    }

    bindPointBtn(document.getElementById('btn-plus'),  1);
    bindPointBtn(document.getElementById('btn-minus'), -1);

    function tick() {
      remaining--;
      timerEl.textContent = format(remaining);
      updateRing();

      if (remaining > 0 && remaining % 30 === 0) {
        vibrate([400, 100, 400]);
        statusEl.textContent = 'Vibration';
        setTimeout(() => { statusEl.textContent = ''; }, 1000);
      }

      if (remaining === 0) {
        vibrate([300, 100, 300, 100, 300, 150, 800]);
        clearInterval(interval);
        running = false;
        interval = null;
        timerEl.classList.add('finished');
        ringEl.classList.add('finished');
        btnEl.textContent = 'Neu starten';
        btnEl.classList.remove('running');
        statusEl.textContent = 'Fertig!';
      }
    }

    function toggle() {
      if (remaining === 0) {
        remaining = TOTAL;
        points = 0;
        pointsEl.textContent = '0';
        pointsEl.className = '';
        timerEl.textContent = format(remaining);
        timerEl.classList.remove('finished');
        ringEl.classList.remove('finished');
        updateRing();
        statusEl.textContent = '';
      }

      if (!running) {
        if (!canVibrate) {
          statusEl.innerHTML = '⚠ Vibration nicht verfügbar &mdash; bitte <a href="#" onclick="openInChrome()">in Chrome öffnen</a>';
          return;
        }
        initAudio();
        vibrate([400, 100, 400]);
        statusEl.textContent = '';
        running = true;
        btnEl.textContent = 'Stop';
        btnEl.classList.add('running');
        interval = setInterval(tick, 1000);
      } else {
        running = false;
        clearInterval(interval);
        interval = null;
        btnEl.textContent = 'Weiter';
        btnEl.classList.remove('running');
      }
    }
  </script>

</body>
</html>
